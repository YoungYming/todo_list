{% extends "base.html" %}
{% block title %}Epic 看板 - Todo Server{% endblock %}
{% block content %}
<header class="page-header">
  <h1 class="page-header__title">Epic 看板</h1>
  <p class="page-header__meta">进行中 / 已完成 / 已过期未完成 + 今日需完成白板</p>
</header>

<section class="section-create">
  <div class="card">
    <div class="card__header">创建 Epic</div>
    <div class="card__body">
      <form id="form-create-epic">
        <div class="form-group">
          <label class="form-group__label" for="epic-title">标题</label>
          <input type="text" id="epic-title" name="title" class="form-group__input" required />
        </div>
        <div class="form-group">
          <label class="form-group__label" for="epic-description">描述</label>
          <textarea id="epic-description" name="description" class="form-group__textarea" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label class="form-group__label" for="epic-due_date">截止日</label>
          <input type="date" id="epic-due_date" name="due_date" class="form-group__input" />
        </div>
        <div class="form-group">
          <label class="form-group__label" for="epic-priority">优先级 (1–5)</label>
          <input type="number" id="epic-priority" name="priority" class="form-group__input" min="1" max="5" value="3" />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn--primary">创建</button>
        </div>
      </form>
    </div>
  </div>
</section>

<section class="kanban" id="epic-kanban">
  <div class="kanban-col" data-col="in_progress">
    <h3>进行中</h3>
    <div class="kanban-drop" id="col-in-progress"></div>
  </div>
  <div class="kanban-col" data-col="done">
    <h3>已完成</h3>
    <div class="kanban-drop" id="col-done"></div>
  </div>
  <div class="kanban-col" data-col="overdue">
    <h3>已过期未完成</h3>
    <div class="kanban-drop" id="col-overdue"></div>
  </div>
</section>

<section class="card">
  <div class="card__header">今日需完成白板（可从任意列拖入）</div>
  <div class="card__body">
    <div id="today-board" class="kanban-drop"></div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>window.EPICS_DATA = {{ epics | tojson }};</script>
<script src="/static/epics.js?v=20260303-1"></script>
{% endblock %}
